<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ro-Ca CRM — Conversaciones</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --verde:   #25D366;
    --verde-d: #128C7E;
    --azul:    #2563eb;
    --gris-bg: #f0f2f5;
    --gris-1:  #e9edef;
    --gris-2:  #667781;
    --blanco:  #ffffff;
    --rojo:    #ef4444;
    --naranja: #f59e0b;
  }
  body { font-family: 'Segoe UI', sans-serif; background: var(--gris-bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* Header */
  header { background: var(--verde-d); color: white; padding: 12px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  header img { width: 36px; height: 36px; border-radius: 50%; background: white; }
  header h1 { font-size: 1.1rem; font-weight: 600; }
  header .status { margin-left: auto; font-size: 0.8rem; opacity: 0.85; }

  /* Layout principal */
  .layout { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar conversaciones */
  .sidebar { width: 340px; background: white; border-right: 1px solid var(--gris-1); display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-header { padding: 14px 16px; border-bottom: 1px solid var(--gris-1); display: flex; align-items: center; gap: 8px; }
  .sidebar-header h2 { font-size: 0.95rem; font-weight: 600; color: #111; flex: 1; }
  .filtros { display: flex; gap: 6px; }
  .filtro-btn { border: none; background: var(--gris-1); padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; cursor: pointer; color: var(--gris-2); }
  .filtro-btn.activo { background: var(--verde); color: white; }
  .conv-list { overflow-y: auto; flex: 1; }
  .conv-item { display: flex; align-items: flex-start; padding: 12px 16px; gap: 10px; cursor: pointer; border-bottom: 1px solid var(--gris-1); transition: background .15s; }
  .conv-item:hover, .conv-item.activa { background: var(--gris-bg); }
  .conv-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--verde); color: white; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 700; flex-shrink: 0; }
  .conv-info { flex: 1; min-width: 0; }
  .conv-nombre { font-size: 0.9rem; font-weight: 600; color: #111; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .conv-preview { font-size: 0.78rem; color: var(--gris-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
  .conv-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .conv-hora { font-size: 0.7rem; color: var(--gris-2); }
  .badge-estado { padding: 2px 6px; border-radius: 8px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; }
  .badge-bot      { background: #dbeafe; color: #1d4ed8; }
  .badge-abierta  { background: #fef9c3; color: #854d0e; }
  .badge-resuelta { background: #f0fdf4; color: #166534; }
  .badge-pedido   { background: #dc2626; color: white; animation: pulse-badge .9s infinite; }
  @keyframes pulse-badge { 0%,100% { opacity:1 } 50% { opacity:.65 } }

  /* Panel chat */
  .chat-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .chat-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--gris-2); font-size: 0.95rem; }

  /* Chat header */
  .chat-header { background: var(--gris-1); padding: 10px 18px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #ddd; flex-shrink: 0; }
  .chat-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--verde); color: white; display: flex; align-items: center; justify-content: center; font-size: 1rem; font-weight: 700; }
  .chat-info { flex: 1; }
  .chat-nombre { font-size: 0.95rem; font-weight: 600; }
  .chat-telefono { font-size: 0.75rem; color: var(--gris-2); }
  .acciones { display: flex; gap: 8px; }
  .btn { border: none; padding: 6px 14px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; font-weight: 600; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn-tomar        { background: var(--naranja); color: white; }
  .btn-tomar-pedido { background: #dc2626; color: white; animation: pulse-badge .9s infinite; }
  .btn-bot          { background: var(--verde); color: white; }
  .btn-resolver     { background: var(--gris-2); color: white; }
  .btn-send         { background: var(--verde-d); color: white; width: 42px; height: 42px; border-radius: 50%; font-size: 1.1rem; flex-shrink: 0; }

  /* Mensajes */
  .mensajes { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 4px; background: #eae6df url("data:image/png;base64,") }
  .msg-row { display: flex; }
  .msg-row.entrada { justify-content: flex-start; }
  .msg-row.salida  { justify-content: flex-end; }
  .msg-burbuja { max-width: 65%; padding: 8px 12px; border-radius: 10px; font-size: 0.875rem; line-height: 1.45; position: relative; word-wrap: break-word; }
  .msg-row.entrada .msg-burbuja { background: white; border-top-left-radius: 0; }
  .msg-row.salida  .msg-burbuja { background: #d9fdd3; border-top-right-radius: 0; }
  .msg-sistema { width: 100%; display: flex; justify-content: center; margin: 8px 0; }
  .msg-sistema-inner { background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 8px 14px; font-size: 0.8rem; color: #000; max-width: 85%; white-space: pre-wrap; text-align: center; }
  .msg-enviado { font-size: 0.65rem; color: var(--gris-2); margin-top: 2px; text-align: right; }
  .msg-hora { font-size: 0.65rem; color: var(--gris-2); margin-top: 3px; display: flex; justify-content: flex-end; gap: 4px; }
  .msg-sender { font-size: 0.7rem; color: var(--verde-d); font-weight: 600; margin-bottom: 2px; }

  /* Input */
  .chat-input { padding: 10px 14px; background: var(--gris-1); display: flex; align-items: center; gap: 10px; flex-shrink: 0; border-top: 1px solid #ddd; }
  .chat-input textarea { flex: 1; border: none; border-radius: 20px; padding: 10px 16px; font-size: 0.875rem; resize: none; outline: none; max-height: 120px; background: white; font-family: inherit; }
  .agente-input { font-size: 0.75rem; color: var(--gris-2); margin-bottom: 4px; }

  /* Toast */
  .toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 10px 18px; border-radius: 8px; font-size: 0.85rem; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; }

  .sin-conversaciones { padding: 40px 20px; text-align: center; color: var(--gris-2); font-size: 0.85rem; }
  .loader { text-align: center; padding: 20px; color: var(--gris-2); font-size: 0.8rem; }

  /* Animaciones */
  @keyframes pulse-verde {
    0%   { box-shadow: 0 0 0 0 rgba(37,211,102,.8); }
    70%  { box-shadow: 0 0 0 8px rgba(37,211,102,0); }
    100% { box-shadow: 0 0 0 0 rgba(37,211,102,0); }
  }
  @keyframes pulse-naranja {
    0%   { box-shadow: 0 0 0 0 rgba(245,158,11,.8); }
    70%  { box-shadow: 0 0 0 8px rgba(245,158,11,0); }
    100% { box-shadow: 0 0 0 0 rgba(245,158,11,0); }
  }

  /* Mensajes no leídos — verde pulsante */
  .conv-item.no-leida { background: #f0fdf4; border-left: 3px solid var(--verde); }
  .conv-item.no-leida .conv-nombre { font-weight: 700; color: #000; }
  .conv-item.no-leida .conv-preview { color: #111; font-weight: 500; }
  .conv-item.no-leida .conv-avatar { background: var(--verde); animation: pulse-verde 1.4s infinite; }
  .no-leida-dot { width: 11px; height: 11px; background: var(--verde); border-radius: 50%; flex-shrink: 0; margin-top: 3px; animation: pulse-verde 1.4s infinite; }

  /* Alertas de sistema — naranja pulsante */
  .conv-item.con-alerta { background: #fffbeb; border-left: 3px solid var(--naranja); }
  .conv-item.con-alerta .conv-nombre { font-weight: 700; color: #000; }
  .conv-item.con-alerta .conv-avatar { background: var(--naranja); animation: pulse-naranja 1.4s infinite; }
  .alerta-dot { width: 10px; height: 10px; background: var(--naranja); border-radius: 50%; margin-top: 2px; animation: pulse-naranja 1.4s infinite; flex-shrink: 0; }

  /* Tabs de navegación */
  .tabs-nav { background: #0a7464; display: flex; padding: 0 14px; gap: 2px; flex-shrink: 0; border-bottom: 1px solid rgba(0,0,0,.15); }
  .tab-btn { background: transparent; border: none; color: rgba(255,255,255,.65); padding: 9px 18px; font-size: 0.85rem; font-weight: 600; cursor: pointer; border-bottom: 3px solid transparent; display: flex; align-items: center; gap: 7px; transition: color .15s; }
  .tab-btn:hover { color: rgba(255,255,255,.9); }
  .tab-btn.activa { color: white; border-bottom-color: white; }
  .tab-badge { background: #dc2626; color: white; border-radius: 10px; padding: 1px 7px; font-size: 0.68rem; font-weight: 700; animation: pulse-badge .9s infinite; }

  /* Panel pedidos */
  .pedidos-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .pedidos-toolbar { background: white; border-bottom: 1px solid var(--gris-1); padding: 12px 20px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .pedidos-toolbar h2 { font-size: 0.95rem; font-weight: 700; color: #111; flex: 1; }
  .filtro-pedido-btn { border: none; background: var(--gris-1); padding: 5px 12px; border-radius: 12px; font-size: 0.75rem; cursor: pointer; color: var(--gris-2); font-weight: 600; transition: background .15s; }
  .filtro-pedido-btn.activo { background: var(--azul); color: white; }
  .pedidos-body { flex: 1; overflow-y: auto; padding: 16px; }
  .pedido-card { background: white; border-radius: 10px; border: 1px solid var(--gris-1); padding: 14px 18px; margin-bottom: 10px; display: flex; gap: 14px; align-items: flex-start; transition: box-shadow .15s; }
  .pedido-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.08); }
  .pedido-icono { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
  .pedido-icono.bateria { background: #fef3c7; }
  .pedido-icono.repuesto { background: #dbeafe; }
  .pedido-icono.servicio_domicilio { background: #f3e8ff; }
  .pedido-data { flex: 1; min-width: 0; }
  .pedido-titulo { font-size: 0.9rem; font-weight: 700; color: #111; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pedido-subtitulo { font-size: 0.78rem; color: var(--gris-2); margin-bottom: 6px; }
  .pedido-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .pedido-tag { background: var(--gris-1); color: #444; padding: 2px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 500; }
  .pedido-acciones { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; min-width: 120px; }
  .pedido-fecha { font-size: 0.68rem; color: var(--gris-2); white-space: nowrap; }
  .badge-pedido-estado { padding: 3px 9px; border-radius: 8px; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .3px; }
  .estado-pendiente  { background: #fef3c7; color: #92400e; }
  .estado-confirmado { background: #dbeafe; color: #1e40af; }
  .estado-completado { background: #d1fae5; color: #065f46; }
  .estado-cancelado  { background: #fee2e2; color: #991b1b; }
  .btn-pedido-accion { border: none; padding: 4px 10px; border-radius: 6px; font-size: 0.72rem; cursor: pointer; font-weight: 600; transition: opacity .15s; }
  .btn-pedido-accion:hover { opacity: .82; }
</style>
</head>
<body>

<header>
  <div style="width:36px;height:36px;border-radius:50%;background:#25D366;display:flex;align-items:center;justify-content:center;font-size:1.2rem;">🔧</div>
  <h1>Autopartes Ro-Ca — CRM</h1>
  <span class="status" id="status-txt">Cargando...</span>
</header>

<nav class="tabs-nav">
  <button class="tab-btn activa" id="tab-btn-convs" onclick="setTabActiva('conversaciones')">💬 Conversaciones</button>
  <button class="tab-btn" id="tab-btn-pedidos" onclick="setTabActiva('pedidos')">📦 Pedidos <span class="tab-badge" id="pedidos-badge" style="display:none">0</span></button>
</nav>

<div class="layout" id="vista-conversaciones">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>Conversaciones</h2>
      <div class="filtros">
        <button class="filtro-btn activo" data-filtro="todas" onclick="setFiltro('todas',this)">Todas</button>
        <button class="filtro-btn" data-filtro="abierta" onclick="setFiltro('abierta',this)">Humano</button>
        <button class="filtro-btn" data-filtro="bot" onclick="setFiltro('bot',this)">Bot</button>
      </div>
    </div>
    <div class="conv-list" id="conv-list">
      <div class="loader">Cargando conversaciones...</div>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-panel" id="chat-panel">
    <div class="chat-empty">← Seleccioná una conversación</div>
  </div>
</div>

<!-- Vista Pedidos -->
<div id="vista-pedidos" class="pedidos-panel" style="display:none">
  <div class="pedidos-toolbar">
    <h2>📦 Pedidos de Clientes</h2>
    <button class="filtro-pedido-btn activo" onclick="setFiltroPedido('pendiente',this)">Pendientes</button>
    <button class="filtro-pedido-btn" onclick="setFiltroPedido('confirmado',this)">Confirmados</button>
    <button class="filtro-pedido-btn" onclick="setFiltroPedido('completado',this)">Completados</button>
    <button class="filtro-pedido-btn" onclick="setFiltroPedido('todos',this)">Todos</button>
  </div>
  <div class="pedidos-body" id="pedidos-body">
    <div class="loader">Cargando pedidos...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Config ───────────────────────────────────────────────────────────────────
const SUPA    = 'https://uqmuiwrauscyxsrdezjr.supabase.co';
const SKEY    = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxbXVpd3JhdXNjeXhzcmRlempyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NzQ0MTYsImV4cCI6MjA5MjM1MDQxNn0.nQy8zXKrPt7pQqYkGMPVKPu4dq71ATn2n4fKtIpUdnk';
const N8N     = 'https://n8n-n8n.7gipwe.easypanel.host/webhook';
const GOOGLE_REVIEW = 'https://g.page/r/Cbs6iqRqLEd5EBM/review';
const AGENTE  = localStorage.getItem('crm_agente') || promptAgente();

function promptAgente() {
  const n = prompt('Tu nombre (para identificar quién envía el mensaje):') || 'Agente';
  localStorage.setItem('crm_agente', n);
  return n;
}

// ── Estado ───────────────────────────────────────────────────────────────────
let conversaciones  = [];
let convActiva      = null;
let mensajesActivos = [];
let filtro          = 'todas';
let pollingConvId   = null;
let alertasConvs    = new Set();   // IDs de conversaciones con alerta pendiente
let ultimoCheckTs   = new Date().toISOString(); // solo alertas NUEVAS desde que cargó la página

// ── No leídos ────────────────────────────────────────────────────────────────
function getLastRead(convId) {
  return parseInt(localStorage.getItem('crm_lr_' + convId) || '0', 10);
}
function setLastRead(convId) {
  localStorage.setItem('crm_lr_' + convId, Date.now().toString());
}
function esNoLeida(conv) {
  if (convActiva && conv.id === convActiva.id) return false; // la que estoy viendo no cuenta
  return new Date(conv.updated_at).getTime() > getLastRead(conv.id);
}

// ── Helpers de contacto ──────────────────────────────────────────────────────
function jidToTelefono(jid) {
  if (!jid || jid.includes('@lid')) return null;
  return jid.replace(/@[^@]+$/, '');
}
function displayTelefono(contacto) {
  if (contacto.telefono) return '+' + contacto.telefono;
  const t = jidToTelefono(contacto.jid);
  return t ? '+' + t : (contacto.jid || '');
}
function displayNombre(contacto) {
  return contacto.nombre || contacto.telefono || jidToTelefono(contacto.jid) || contacto.jid || '?';
}

// ── API Supabase ─────────────────────────────────────────────────────────────
const H = { 'apikey': SKEY, 'Authorization': 'Bearer ' + SKEY, 'Content-Type': 'application/json' };

async function sbGet(path) {
  const r = await fetch(SUPA + '/rest/v1/' + path, { headers: H });
  return r.json();
}
async function sbPost(path, body) {
  const r = await fetch(SUPA + '/rest/v1/' + path, { method: 'POST', headers: { ...H, 'Prefer': 'return=representation' }, body: JSON.stringify(body) });
  return r.json();
}
async function sbPatch(path, body) {
  await fetch(SUPA + '/rest/v1/' + path, { method: 'PATCH', headers: { ...H, 'Prefer': 'return=minimal' }, body: JSON.stringify(body) });
}

// ── Cargar conversaciones ────────────────────────────────────────────────────
async function cargarConversaciones() {
  // Join conversaciones + contactos
  const convs = await sbGet(
    'crm_conversaciones?select=*,crm_contactos(jid,telefono,nombre)&order=updated_at.desc&limit=60'
  );
  conversaciones = Array.isArray(convs) ? convs : [];
  renderConvList();
  document.getElementById('status-txt').textContent =
    conversaciones.length + ' conversaciones · ' + new Date().toLocaleTimeString('es-AR', {hour:'2-digit',minute:'2-digit'});
}

function setFiltro(f, btn) {
  filtro = f;
  document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('activo'));
  btn.classList.add('activo');
  renderConvList();
}

function renderConvList() {
  const lista = document.getElementById('conv-list');
  let items = filtro === 'todas' ? conversaciones : conversaciones.filter(c => c.estado === filtro);

  if (!items.length) {
    lista.innerHTML = '<div class="sin-conversaciones">Sin conversaciones</div>';
    return;
  }

  lista.innerHTML = items.map(c => {
    const contacto  = c.crm_contactos || {};
    const nombre    = displayNombre(contacto);
    const telefono  = displayTelefono(contacto);
    const inicial   = nombre.charAt(0).toUpperCase();
    const hora      = new Date(c.updated_at).toLocaleTimeString('es-AR', {hour:'2-digit',minute:'2-digit'});
    const activa    = convActiva && c.id === convActiva.id ? 'activa' : '';
    const tieneAlerta = alertasConvs.has(c.id);
    const noLeida   = !tieneAlerta && esNoLeida(c); // alerta tiene prioridad visual
    const clases    = [activa, tieneAlerta ? 'con-alerta' : '', noLeida ? 'no-leida' : ''].filter(Boolean).join(' ');
    const indicador = tieneAlerta
      ? '<div class="alerta-dot"></div>'
      : noLeida ? '<div class="no-leida-dot"></div>' : '';
    const estadoBadge = tieneAlerta
      ? `<span class="badge-estado badge-pedido">🔔 Pedido</span>`
      : `<span class="badge-estado badge-${c.estado}">${c.estado === 'bot' ? '🤖 Bot' : c.estado === 'abierta' ? '👤 Humano' : '✅ Resuelto'}</span>`;
    return `
      <div class="conv-item ${clases}" onclick="abrirChat('${c.id}')">
        <div class="conv-avatar">${inicial}</div>
        <div class="conv-info">
          <div class="conv-nombre">${escapeHtml(nombre)}</div>
          <div class="conv-preview">${escapeHtml(telefono)}</div>
        </div>
        <div class="conv-meta">
          <span class="conv-hora">${hora}</span>
          ${estadoBadge}
          ${indicador}
        </div>
      </div>`;
  }).join('');
}

// ── Abrir chat ───────────────────────────────────────────────────────────────
async function abrirChat(convId) {
  convActiva = conversaciones.find(c => c.id === convId);
  if (!convActiva) return;
  alertasConvs.delete(convId); // limpiar alerta
  setLastRead(convId);          // marcar como leída
  renderConvList();
  renderChatPanel();
  await cargarMensajes();
}

function renderChatPanel() {
  const c = convActiva;
  const contacto = c.crm_contactos || {};
  const nombre   = displayNombre(contacto);
  const inicial  = nombre.charAt(0).toUpperCase();
  const telefono = displayTelefono(contacto);

  const hayPedido = alertasConvs.has(c.id);
  const btnAccion = c.estado === 'bot'
    ? hayPedido
      ? `<button class="btn btn-tomar-pedido" onclick="cambiarEstado('abierta')">🔔 Atender pedido</button>`
      : `<button class="btn btn-tomar" onclick="cambiarEstado('abierta')">👤 Tomar control</button>`
    : c.estado === 'abierta'
    ? `<button class="btn btn-bot" onclick="cambiarEstado('bot')">🤖 Devolver al bot</button>
       <button class="btn btn-resolver" onclick="cambiarEstado('resuelta')">✅ Resolver</button>`
    : `<button class="btn btn-bot" onclick="cambiarEstado('bot')">🔄 Reabrir</button>`;

  document.getElementById('chat-panel').innerHTML = `
    <div class="chat-header">
      <div class="chat-avatar">${inicial}</div>
      <div class="chat-info">
        <div class="chat-nombre">${escapeHtml(nombre)}</div>
        <div class="chat-telefono">${escapeHtml(telefono)}</div>
      </div>
      <div class="acciones">${btnAccion}</div>
    </div>
    <div class="mensajes" id="mensajes-container"></div>
    <div class="chat-input" id="chat-input-area">
      <div style="flex:1">
        <div class="agente-input">Enviando como: <strong>${escapeHtml(AGENTE)}</strong></div>
        <textarea id="msg-input" rows="1" placeholder="Escribí un mensaje..." onkeydown="onKeyDown(event)" oninput="autoResize(this)"></textarea>
      </div>
      <button class="btn btn-send" onclick="enviarMensaje()">➤</button>
    </div>`;
}

async function cargarMensajes() {
  if (!convActiva) return;
  const msgs = await sbGet(
    'crm_mensajes?conversacion_id=eq.' + convActiva.id + '&order=timestamp.asc&limit=200'
  );
  mensajesActivos = Array.isArray(msgs) ? msgs : [];
  renderMensajes();
}

function renderMensajes() {
  const cont = document.getElementById('mensajes-container');
  if (!cont) return;

  if (!mensajesActivos.length) {
    cont.innerHTML = '<div style="text-align:center;color:#999;padding:20px;font-size:0.8rem">Sin mensajes aún</div>';
    return;
  }

  cont.innerHTML = mensajesActivos.map(m => {
    const hora  = new Date(m.timestamp).toLocaleTimeString('es-AR', {hour:'2-digit',minute:'2-digit'});
    if (m.enviado_por === 'sistema') {
      return `<div class="msg-sistema"><div class="msg-sistema-inner">🔔 ${escapeHtml(m.contenido).replace(/\n/g,'<br>')}<br><span style="font-size:0.65rem;opacity:0.7">${hora}</span></div></div>`;
    }
    const esBot = m.enviado_por === 'bot' || m.enviado_por === 'Roquita';
    const senderLabel = m.direccion === 'salida' && !esBot
      ? `<div class="msg-sender">${escapeHtml(m.enviado_por)}</div>` : '';
    return `
      <div class="msg-row ${m.direccion}">
        <div class="msg-burbuja">
          ${senderLabel}
          <div>${escapeHtml(m.contenido).replace(/\n/g,'<br>')}</div>
          <div class="msg-hora">
            ${hora}
            ${m.direccion === 'salida' ? '<span style="color:#53bdeb">✓✓</span>' : ''}
          </div>
        </div>
      </div>`;
  }).join('');

  cont.scrollTop = cont.scrollHeight;
}

// ── Enviar mensaje desde CRM ─────────────────────────────────────────────────
async function enviarMensaje() {
  const input = document.getElementById('msg-input');
  if (!input || !convActiva) return;
  const texto = input.value.trim();
  if (!texto) return;

  const contacto = convActiva.crm_contactos || {};
  const jid = contacto.jid;
  if (!jid) { toast('❌ No hay JID para este contacto'); return; }

  input.value = '';
  input.style.height = '';

  try {
    const r = await fetch(N8N + '/crm/enviar-mensaje', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ jid, texto, agente: AGENTE, conv_id: convActiva.id })
    });
    if (!r.ok) throw new Error('Error ' + r.status);
    // Optimistic update
    mensajesActivos.push({
      id: Date.now().toString(),
      conversacion_id: convActiva.id,
      contenido: texto,
      direccion: 'salida',
      enviado_por: AGENTE,
      timestamp: new Date().toISOString()
    });
    renderMensajes();
    setLastRead(convActiva.id); // el agente leyó esta conv al enviar
    toast('✓ Mensaje enviado');
  } catch(e) {
    toast('❌ Error al enviar: ' + e.message);
  }
}

// ── Cambiar estado ───────────────────────────────────────────────────────────
async function cambiarEstado(nuevoEstado) {
  if (!convActiva) return;
  try {
    const patch = { estado: nuevoEstado, updated_at: new Date().toISOString() };
    if (nuevoEstado !== 'bot') patch.atendido_por = AGENTE;
    if (nuevoEstado === 'bot') patch.atendido_por = null;
    const r = await fetch(`${SUPA}/rest/v1/crm_conversaciones?id=eq.${convActiva.id}`, {
      method: 'PATCH',
      headers: { 'apikey': SKEY, 'Authorization': 'Bearer ' + SKEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify(patch)
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    convActiva.estado = nuevoEstado;
    const idx = conversaciones.findIndex(c => c.id === convActiva.id);
    if (idx >= 0) conversaciones[idx].estado = nuevoEstado;
    renderChatPanel();
    renderConvList();
    await cargarMensajes();
    toast('Estado cambiado a: ' + nuevoEstado);
  } catch(e) {
    toast('❌ Error: ' + e.message);
  }
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function onKeyDown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviarMensaje(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
function escapeHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Tabs ─────────────────────────────────────────────────────────────────────
function setTabActiva(tab) {
  const esConvs = tab === 'conversaciones';
  document.getElementById('vista-conversaciones').style.display = esConvs ? 'flex' : 'none';
  document.getElementById('vista-pedidos').style.display        = esConvs ? 'none' : 'flex';
  document.getElementById('tab-btn-convs').classList.toggle('activa',   esConvs);
  document.getElementById('tab-btn-pedidos').classList.toggle('activa', !esConvs);
  if (!esConvs) cargarPedidos();
}

// ── Pedidos ──────────────────────────────────────────────────────────────────
let pedidos      = [];
let filtroPedido = 'pendiente';

async function cargarPedidos() {
  try {
    const data = await sbGet('crm_pedidos?order=created_at.desc&limit=100');
    pedidos = Array.isArray(data) ? data : [];
    renderPedidos();
    actualizarBadgePedidos();
  } catch(e) { /* tabla puede no existir aún */ }
}

function actualizarBadgePedidos() {
  const n = pedidos.filter(p => p.estado === 'pendiente').length;
  const badge = document.getElementById('pedidos-badge');
  if (!badge) return;
  badge.style.display = n > 0 ? 'inline' : 'none';
  badge.textContent   = n;
}

function setFiltroPedido(f, btn) {
  filtroPedido = f;
  document.querySelectorAll('.filtro-pedido-btn').forEach(b => b.classList.remove('activo'));
  btn.classList.add('activo');
  renderPedidos();
}

function renderPedidos() {
  const cont = document.getElementById('pedidos-body');
  if (!cont) return;
  const items = filtroPedido === 'todos' ? pedidos : pedidos.filter(p => p.estado === filtroPedido);

  if (!items.length) {
    cont.innerHTML = `<div style="text-align:center;color:var(--gris-2);padding:50px;font-size:0.9rem">
      Sin pedidos ${filtroPedido !== 'todos' ? '"' + filtroPedido + '"' : ''}</div>`;
    return;
  }

  const iconos = { bateria: '🔋', repuesto: '🔧', servicio_domicilio: '🚗' };
  const tipos  = { bateria: 'Batería', repuesto: 'Repuesto', servicio_domicilio: 'Servicio a domicilio' };

  cont.innerHTML = items.map(p => {
    const icono = iconos[p.tipo] || '📦';
    const tipo  = tipos[p.tipo]  || p.tipo;
    const fecha = new Date(p.created_at).toLocaleString('es-AR', {
      day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute: '2-digit'
    });
    const tags = [
      p.vehiculo         ? '🚙 ' + p.vehiculo         : null,
      p.precio_estimado  ? '💰 ' + p.precio_estimado  : null,
      p.cliente_telefono ? '📞 +' + p.cliente_telefono : null,
    ].filter(Boolean);

    const botonesAccion = p.estado === 'pendiente'
      ? `<div style="display:flex;gap:4px">
           <button class="btn-pedido-accion" style="background:#2563eb;color:white"
             onclick="actualizarPedidoEstado('${p.id}','confirmado')">✓ Confirmar</button>
           <button class="btn-pedido-accion" style="background:#6b7280;color:white"
             onclick="actualizarPedidoEstado('${p.id}','cancelado')">✗</button>
         </div>`
      : p.estado === 'confirmado'
      ? `<button class="btn-pedido-accion" style="background:#059669;color:white"
           onclick="actualizarPedidoEstado('${p.id}','completado')">✅ Completado</button>`
      : '';

    return `
      <div class="pedido-card">
        <div class="pedido-icono ${p.tipo}">${icono}</div>
        <div class="pedido-data">
          <div class="pedido-titulo">${escapeHtml(p.descripcion)}</div>
          <div class="pedido-subtitulo">${tipo}${p.cliente_nombre ? ' · ' + escapeHtml(p.cliente_nombre) : ''}</div>
          <div class="pedido-tags">${tags.map(t => `<span class="pedido-tag">${escapeHtml(t)}</span>`).join('')}</div>
        </div>
        <div class="pedido-acciones">
          <span class="pedido-fecha">${fecha}</span>
          <span class="badge-pedido-estado estado-${p.estado}">${p.estado}</span>
          ${botonesAccion}
        </div>
      </div>`;
  }).join('');
}

async function actualizarPedidoEstado(id, estado) {
  try {
    await sbPatch('crm_pedidos?id=eq.' + id, { estado, updated_at: new Date().toISOString() });
    const p = pedidos.find(x => x.id === id);
    if (p) {
      p.estado = estado;
      await enviarMsgPedido(p, estado);
    }
    renderPedidos();
    actualizarBadgePedidos();
    toast('Pedido ' + estado);
  } catch(e) {
    toast('❌ Error: ' + e.message);
  }
}

async function enviarMsgPedido(p, estado) {
  if (!p.cliente_jid) return;
  const firma = '\n\n_Autopartes Ro-Ca 🔧_';
  const esDomicilio = p.tipo === 'bateria_domicilio' || p.tipo === 'servicio_domicilio';
  let texto = null;

  if (estado === 'confirmado') {
    texto = esDomicilio
      ? '¡Tu pedido ha sido enviado! 🚗📦 Esperalo, ya va en camino.' + firma
      : 'Estamos preparando tu pedido 🔧 Te avisamos cuando esté listo para retirar en el local.\n📍 *Av. Gonzalez Lelong 1571, Formosa-Formosa*' + firma;
  } else if (estado === 'completado') {
    texto = '¡Hemos entregado tu pedido! 📦 Muchas gracias por tu compra 🙌\n\n¿Podés dejarnos una reseña en Google? Nos ayuda muchísimo 🌟\n👉 ' + GOOGLE_REVIEW + firma;
  }

  if (!texto) return;
  try {
    await fetch(N8N + '/crm/enviar-mensaje', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ jid: p.cliente_jid, texto, agente: 'Sistema', conv_id: p.conversacion_id })
    });
  } catch(e) { console.warn('WhatsApp msg error:', e); }
}

// ── Notificaciones (mensajes nuevos en background) ───────────────────────────
async function checkNotificaciones() {
  try {
    // Traer TODOS los mensajes nuevos desde el último check (entrada + sistema)
    const nuevos = await sbGet(
      'crm_mensajes?timestamp=gt.' + ultimoCheckTs + '&order=timestamp.asc&limit=30'
    );
    const msgs = Array.isArray(nuevos) ? nuevos : [];
    if (msgs.length === 0) return;

    let refrescaLista = false;

    msgs.forEach(m => {
      const esConvActiva = convActiva && m.conversacion_id === convActiva.id;
      const conv   = conversaciones.find(c => c.id === m.conversacion_id);
      const nombre = conv ? displayNombre(conv.crm_contactos || {}) : 'Cliente';
      const texto  = m.contenido.replace(/\n/g, ' ').substring(0, 55);

      if (m.enviado_por === 'sistema') {
        // Alerta naranja (pedido en prep, quiere persona, GPS, etc.)
        if (!esConvActiva) {
          alertasConvs.add(m.conversacion_id);
          toast('🔔 ' + nombre + ': ' + texto);
          refrescaLista = true;
        }
        // Puede haber nuevo pedido — refrescar badge
        setTimeout(cargarPedidos, 800);
      } else if (m.direccion === 'entrada') {
        // Mensaje nuevo del cliente
        if (!esConvActiva) {
          toast('💬 ' + nombre + ': ' + texto);
          refrescaLista = true;
        }
      }
    });

    // Avanzar el cursor temporal
    ultimoCheckTs = msgs[msgs.length - 1].timestamp;

    if (refrescaLista) {
      // Refrescar lista para que updated_at sea actual y el dot verde aparezca
      await cargarConversaciones();
    }
  } catch(e) { /* silencioso */ }
}

// ── Polling ──────────────────────────────────────────────────────────────────
async function pollMensajes() {
  if (convActiva) await cargarMensajes();
}
async function pollConversaciones() {
  await cargarConversaciones();
}

// Iniciar
cargarConversaciones();
cargarPedidos();
setInterval(pollMensajes, 3000);             // mensajes de la conv activa cada 3s
setInterval(pollConversaciones, 10000);      // lista completa cada 10s
setInterval(checkNotificaciones, 4000);      // detectar nuevos mensajes cada 4s
setInterval(cargarPedidos, 20000);           // badge de pedidos cada 20s
</script>
